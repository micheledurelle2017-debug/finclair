<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}FinClair{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    {% if user.is_authenticated %}
   <nav>
    <div class="nav-logo">💰 FinClair</div>
    <div class="nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'liste_transactions' %}">Transactions</a>
        <a href="{% url 'liste_budgets' %}">Budgets</a>
        <a href="{% url 'liste_objectifs' %}">Objectifs</a>
        <a href="{% url 'liste_dettes' %}">Dettes</a>
        <a href="{% url 'statistiques' %}">Statistiques</a>
        <a href="{% url 'liste_alertes' %}">Alertes</a>
        <a href="{% url 'profil' %}">👤 {{ user.username }}</a>
        <a href="{% url 'deconnexion' %}">Déconnexion</a>
    </div>
</nav>
    {% endif %}

    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block contenu %}{% endblock %}
    </main>

</body>
</html>
