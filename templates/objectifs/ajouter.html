{% extends 'base.html' %}
{% block titre %}Ajouter un objectif{% endblock %}

{% block contenu %}
<div class="form-container">
    <h1>Nouvel Objectif</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Titre</label>
            <input type="text" name="titre" required>
        </div>
        <div class="form-group">
            <label>Montant cible (FCFA)</label>
            <input type="number" name="montant_cible" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Date cible</label>
            <input type="date" name="date_cible" required>
        </div>
        <div class="form-group">
            <label>Description (optionnel)</label>
            <textarea name="description"></textarea>
        </div>
        <button type="submit">Enregistrer</button>
        <a href="{% url 'liste_objectifs' %}">Annuler</a>
    </form>
</div>
{% endblock %}
