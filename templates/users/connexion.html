{% extends 'base.html' %}
{% block titre %}Connexion — FinClair{% endblock %}

{% block contenu %}
<div class="auth-container">
    <h1>Connexion</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>
    <p>Pas encore de compte ? <a href="{% url 'inscription' %}">S'inscrire</a></p>
</div>
{% endblock %}
