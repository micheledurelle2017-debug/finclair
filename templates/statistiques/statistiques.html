{% extends 'base.html' %}
{% block titre %}Statistiques — FinClair{% endblock %}

{% block contenu %}
<div class="page">
    <h1>Mes Statistiques</h1>

    <div class="dashboard-graphiques">
        <div class="graphique-carte">
            <h2>Revenus vs Dépenses par mois</h2>
            <canvas id="graphiqueMois"></canvas>
        </div>
        <div class="graphique-carte">
            <h2>Dépenses par catégorie</h2>
            <canvas id="graphiqueCategories"></canvas>
        </div>
    </div>
</div>

<script>
var moisLabels = {{ mois_labels|safe }};
var revenusData = {{ revenus_data|safe }};
var depensesData = {{ depenses_data|safe }};
var catLabels = {{ cat_labels|safe }};
var catData = {{ cat_data|safe }};

var ctx1 = document.getElementById('graphiqueMois').getContext('2d');
new Chart(ctx1, {
    type: 'line',
    data: {
        labels: moisLabels,
        datasets: [
            {
                label: 'Revenus',
                data: revenusData,
                borderColor: '#28a745',
                backgroundColor: 'rgba(40,167,69,0.1)',
                tension: 0.4,
                fill: true
            },
            {
                label: 'Dépenses',
                data: depensesData,
                borderColor: '#dc3545',
                backgroundColor: 'rgba(220,53,69,0.1)',
                tension: 0.4,
                fill: true
            }
        ]
    },
    options: { responsive: true }
});

var ctx2 = document.getElementById('graphiqueCategories').getContext('2d');
new Chart(ctx2, {
    type: 'doughnut',
    data: {
        labels: catLabels,
        datasets: [{
            data: catData,
            backgroundColor: ['#f0c040','#28a745','#dc3545','#007bff','#fd7e14','#6f42c1','#20c997']
        }]
    },
    options: { responsive: true }
});
</script>
{% endblock %}
